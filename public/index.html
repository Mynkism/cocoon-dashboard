<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cocoon Dashboard</title>

  <!-- Google Fonts: Inter for UI text, JetBrains Mono for numbers -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <!-- Chart.js via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>

  <!-- GSAP for card bento effects and gooey nav animations -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header class="site-header">
    <div class="header-inner">
      <div class="header-brand">
        <img src="/logo.png" alt="Cocoon Dashboard" class="header-logo"
             onerror="this.style.display='none';this.nextElementSibling.style.display='inline'">
        <span class="header-brand-text" style="display:none">Cocoon <span class="brand-accent">Dashboard</span></span>
      </div>
      <nav class="tab-nav" role="tablist">
        <button class="tab-btn active" data-tab="daywise"    role="tab" aria-selected="true">Day-Wise</button>
        <button class="tab-btn"        data-tab="analysis"   role="tab" aria-selected="false">Analysis</button>
        <button class="tab-btn"        data-tab="ads"        role="tab" aria-selected="false">Ads Breakdown</button>
      </nav>
      <a href="/logout" class="logout-btn">Logout</a>
    </div>
  </header>

  <!-- ── Warning banners (populated by app.js) ──────────────────────────── -->
  <div id="warnings-container"></div>

  <!-- ── Main content ───────────────────────────────────────────────────── -->
  <main class="main-content">

    <!-- ═══════════════════════════════════════════════════════════════════
         TAB 1: DAY-WISE
    ═══════════════════════════════════════════════════════════════════ -->
    <section id="tab-daywise" class="tab-panel" role="tabpanel">

      <!-- Month selector -->
      <div class="month-selector-row">
        <label for="month-selector" class="month-label">Month</label>
        <select id="month-selector" class="month-select"></select>
      </div>

      <!-- Target cards — only shown when targets exist for the selected month -->
      <div id="target-cards" class="cards-grid-target hidden"></div>

      <!-- Row 1: 4 primary metric cards -->
      <div id="primary-cards" class="cards-grid-primary"></div>

      <!-- Row 2: 9 secondary metric cards -->
      <div id="secondary-cards" class="cards-grid-secondary"></div>

      <!-- Day-by-day table -->
      <div class="table-wrapper">
        <div class="table-scroll">
          <table id="day-table" class="data-table">
            <thead id="day-table-head"></thead>
            <tbody id="day-table-body"></tbody>
            <tfoot id="day-table-foot"></tfoot>
          </table>
        </div>
      </div>

    </section>

    <!-- ═══════════════════════════════════════════════════════════════════
         TAB 2: ANALYSIS
    ═══════════════════════════════════════════════════════════════════ -->
    <section id="tab-analysis" class="tab-panel hidden" role="tabpanel">

      <!-- Sub-tab pills -->
      <div class="subtab-nav">
        <button class="subtab-btn active" data-subtab="mom">Month on Month</button>
        <button class="subtab-btn"        data-subtab="wow">Week on Week</button>
        <button class="subtab-btn"        data-subtab="mtd">Month to Date</button>
        <button class="subtab-btn"        data-subtab="custom">Custom Range</button>
      </div>

      <!-- Channel filter -->
      <div class="channel-toggle-row">
        <button class="channel-btn active" data-channel="overall">Overall</button>
        <button class="channel-btn"        data-channel="google">Google Ads</button>
        <button class="channel-btn"        data-channel="meta">Meta Ads</button>
      </div>

      <!-- Analysis content area -->
      <div class="analysis-layout">
        <div class="analysis-content" id="analysis-content"></div>
      </div>

      <!-- Filter panel toggle -->
      <button class="filter-toggle-btn" id="filter-toggle">Filters ›</button>

      <!-- Filter panel drawer -->
      <aside class="filter-panel" id="filter-panel">
        <div class="filter-panel-header">
          <span class="filter-panel-title">Metrics</span>
          <button class="filter-close-btn" id="filter-close">‹</button>
        </div>
        <div id="filter-checkboxes"></div>
      </aside>

    </section>

    <!-- ═══════════════════════════════════════════════════════════════════
         TAB 3: ADS BREAKDOWN
    ═══════════════════════════════════════════════════════════════════ -->
    <section id="tab-ads" class="tab-panel hidden" role="tabpanel">

      <!-- Platform toggle -->
      <div class="platform-toggle-row">
        <button class="platform-btn active" data-platform="google">Google Ads</button>
        <button class="platform-btn"        data-platform="meta">Meta Ads</button>
        <button class="platform-btn"        data-platform="pinterest">Pinterest Ads</button>
      </div>

      <!-- Google Ads view -->
      <div id="google-view" class="platform-view">
        <div class="date-range-row">
          <label class="range-label">From</label>
          <input type="date" id="google-start" class="date-input" />
          <label class="range-label">To</label>
          <input type="date" id="google-end"   class="date-input" />
          <button class="apply-range-btn" id="google-apply">Apply</button>
        </div>
        <div id="google-cards"    class="cards-grid-tab3"></div>
        <div class="section-header-bar">
          <span class="section-header-label">Campaign Breakdown</span>
          <span class="section-header-range" id="google-range-display"></span>
        </div>
        <div class="table-wrapper">
          <div class="table-scroll">
            <table id="campaign-table" class="data-table">
              <thead id="campaign-table-head"></thead>
              <tbody id="campaign-table-body"></tbody>
              <tfoot id="campaign-table-foot"></tfoot>
            </table>
          </div>
        </div>
      </div>

      <!-- Meta Ads view -->
      <div id="meta-view" class="platform-view hidden">
        <div class="date-range-row">
          <label class="range-label">From</label>
          <input type="date" id="meta-start" class="date-input" />
          <label class="range-label">To</label>
          <input type="date" id="meta-end"   class="date-input" />
          <button class="apply-range-btn" id="meta-apply">Apply</button>
        </div>
        <div id="meta-cards" class="cards-grid-tab3"></div>
        <div class="section-header-bar">
          <span class="section-header-label">Campaign Breakdown</span>
          <span class="section-header-range" id="meta-range-display"></span>
        </div>
        <div class="table-wrapper">
          <div class="table-scroll">
            <table id="meta-campaign-table" class="data-table">
              <thead id="meta-campaign-table-head"></thead>
              <tbody id="meta-campaign-table-body"></tbody>
              <tfoot id="meta-campaign-table-foot"></tfoot>
            </table>
          </div>
        </div>
      </div>

      <!-- Pinterest Ads view -->
      <div id="pinterest-view" class="platform-view hidden">
        <div class="date-range-row">
          <label class="range-label">From</label>
          <input type="date" id="pinterest-start" class="date-input" />
          <label class="range-label">To</label>
          <input type="date" id="pinterest-end"   class="date-input" />
          <button class="apply-range-btn" id="pinterest-apply">Apply</button>
        </div>
        <div id="pinterest-cards" class="cards-grid-tab3"></div>
        <div class="section-header-bar">
          <span class="section-header-label">Ad Breakdown</span>
          <span class="section-header-range" id="pinterest-range-display"></span>
        </div>
        <div class="table-wrapper">
          <div class="table-scroll">
            <table id="pinterest-ad-table" class="data-table">
              <thead id="pinterest-ad-table-head"></thead>
              <tbody id="pinterest-ad-table-body"></tbody>
              <tfoot id="pinterest-ad-table-foot"></tfoot>
            </table>
          </div>
        </div>
      </div>

    </section>

  </main>

  <!-- ── Modal overlay ──────────────────────────────────────────────────── -->
  <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div id="modal-panel" class="modal-panel">
      <div class="modal-header">
        <h2 id="modal-title" class="modal-title"></h2>
        <button id="modal-close" class="modal-close-btn" aria-label="Close">×</button>
      </div>
      <div class="modal-chart-wrap">
        <canvas id="modal-chart"></canvas>
      </div>
    </div>
  </div>

  <!-- ── Footer ─────────────────────────────────────────────────────────── -->
  <footer class="site-footer">
    <span id="footer-cutoff" class="footer-cutoff"></span>
  </footer>

  <script src="charts.js?v=3"></script>
  <script src="app.js?v=3"></script>
</body>
</html>
